name: Update River Conditions

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run USGS river scraper
        run: python scrapers/usgs_rivers.py

      - name: Commit updated rivers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rivers.json
          git diff --cached --quiet || git commit -m "chore: update river conditions [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
