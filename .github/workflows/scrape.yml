name: Update Trail Conditions

on:
  schedule:
    # Runs daily at 7 AM Eastern (11 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scraper
        env:
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
        run: python scrapers/scraper.py

      - name: Commit updated trail conditions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trail_conditions.json
          git diff --cached --quiet || git commit -m "chore: update trail conditions [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
